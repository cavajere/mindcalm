name: mindcalm-notraefik

# =============================================================================
# MindCalm - Docker Compose (senza Traefik)
# =============================================================================
# Stack applicativo senza Traefik integrato. Il reverse proxy e i certificati
# SSL sono gestiti esternamente (Traefik Gateway sul NAS Synology).
# Questo compose gira su una VM Proxmox (o qualsiasi macchina sulla LAN).
#
# L'API espone la porta 3003 sulla VM. Il Traefik Gateway instrada il traffico
# da mindcalm.datagestio.com verso 192.168.0.123:3003.
#
# PREREQUISITI:
#   1. Copia .env.example in .env e configura le variabili
#   2. Esegui: docker compose up -d
#
# PRIMO AVVIO:
#   docker compose up -d --build
#
# AGGIORNAMENTO:
#   docker compose build --pull
#   docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MindCalm Frontend SSR - Nuxt Runtime
  # ---------------------------------------------------------------------------
  frontend-ssr:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.frontend-ssr
    image: mindcalm-frontend-ssr-notraefik:${VERSION:-latest}
    container_name: mindcalm_notraefik_frontend_ssr
    restart: always
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://api:3000
      NUXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://mindcalm.example.com}
      NUXT_PUBLIC_ALLOW_INDEXING: ${NUXT_PUBLIC_ALLOW_INDEXING:-true}
      SSR_INTERNAL_TOKEN: ${SSR_INTERNAL_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL - Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    container_name: mindcalm_notraefik_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mindcalm}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB non esposto all'esterno, accessibile solo dall'API

  # ---------------------------------------------------------------------------
  # MindCalm API - Backend + Frontend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: mindcalm-notraefik:${VERSION:-latest}
    container_name: mindcalm_notraefik_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      frontend-ssr:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mindcalm}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      AUDIO_STORAGE_PATH: /data/audio
      HLS_STORAGE_PATH: /data/hls
      IMAGES_STORAGE_PATH: /data/images
      MAX_AUDIO_SIZE_MB: ${MAX_AUDIO_SIZE_MB:-100}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://mindcalm.example.com}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      RATE_LIMIT_PUBLIC: ${RATE_LIMIT_PUBLIC:-100}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-30}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-bootstrap-admin@example.invalid}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-MindCalm Bootstrap}
      FRONTEND_RENDER_MODE: ${FRONTEND_RENDER_MODE:-ssr}
      FRONTEND_SSR_ORIGIN: http://frontend-ssr:3000
      SSR_INTERNAL_TOKEN: ${SSR_INTERNAL_TOKEN:-}
    volumes:
      - ./data/audio:/data/audio
      - ./data/hls:/data/hls
      - ./data/images:/data/images
    ports:
      # Porta esposta sulla LAN, raggiungibile dal Traefik Gateway sul NAS
      - "${API_PORT:-3003}:3000"
